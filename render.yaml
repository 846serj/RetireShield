services:
  - type: web
    name: retireshield
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_BASE_URL
        value: https://RetireShield.com

  - type: cron
    name: retireshield-monthly-rescore
    runtime: node
    plan: free
    schedule: "0 15 1 * *"
    buildCommand: npm ci && npm run build
    startCommand: 'curl -fsS -X POST -H "Authorization: Bearer $CRON_SECRET" $NEXT_PUBLIC_BASE_URL/api/cron/monthly-rescore'
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NEXT_PUBLIC_BASE_URL
        value: https://RetireShield.com
